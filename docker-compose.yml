  redis:
    image: redis:7-alpine
    restart: always
    expose:
      - "6379"
    volumes:
      - whappi-redis:/data
    networks:
      - dokploy-network
      - default
    command: redis-server --appendonly yes --save 300 10 --save 60 10000
  postgres:
    image: postgres:16-alpine
    restart: always
    expose:
      - "5432"
    environment:
      POSTGRES_DB: whappi
      POSTGRES_USER: whappi
      POSTGRES_PASSWORD: whappi_dev
    volumes:
      - whappi-postgres:/var/lib/postgresql/data
    networks:
      - dokploy-network
      - default
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U whappi
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  whappi-data: null
  whappi-redis: null
  whappi-postgres: null
  whappi-media: null
networks:
  dokploy-network:
