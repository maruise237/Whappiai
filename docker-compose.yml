services:
  whappi-frontend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
    restart: always
    stop_grace_period: 30s
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_PATH=/app/data/whatsapp.db
      - SESSION_SECRET=${SESSION_SECRET}
      - TOKEN_ENCRYPTION_KEY=${TOKEN_ENCRYPTION_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - CLERK_WEBHOOK_SECRET=${CLERK_WEBHOOK_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
      - FRONTEND_DOMAIN=${FRONTEND_DOMAIN}
      - ADMIN_DASHBOARD_PASSWORD=${ADMIN_DASHBOARD_PASSWORD}
      - MASTER_ADMIN_EMAIL=${MASTER_ADMIN_EMAIL}
      - MASTER_API_KEY=${MASTER_API_KEY}
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgres://whappi:whappi_dev@postgres:5432/whappi
      - CAL_CLIENT_ID=${CAL_CLIENT_ID}
      - CAL_CLIENT_SECRET=${CAL_CLIENT_SECRET}
      - CAL_REDIRECT_URI=${CAL_REDIRECT_URI}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - APP_URL=${APP_URL}
      - WHATSAPP_PROVIDER=${WHATSAPP_PROVIDER}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_INSTANCE_PREFIX=${EVOLUTION_INSTANCE_PREFIX}
      - EVOLUTION_WEBHOOK_SECRET=${EVOLUTION_WEBHOOK_SECRET}
    volumes:
      - whappi-data:/app/data
      - whappi-media:/app/media
    networks:
      - dokploy-network
      - default
    labels:
